services:
  event-manager-api:
    build:
      context: ./api
    container_name: event-manager-api
    restart: unless-stopped
    environment:
      PORT: "5000"
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-admin}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME:-eventmanager}
      JWT_SECRET: ${JWT_SECRET:-em-super-secret-jwt-key-2026}
    ports:
      - "5001:5000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  event-manager-web:
    build:
      context: ./web
    container_name: event-manager-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - event-manager-api
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
